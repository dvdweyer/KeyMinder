name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)

      - name: Build
        run: |
          xcodebuild \
            -project KeyMinder.xcodeproj \
            -scheme KeyMinder \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/KeyMinder-CI \
            build | xcpretty && exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild \
            -project KeyMinder.xcodeproj \
            -scheme KeyMinder \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/KeyMinder-CI \
            test | xcpretty && exit ${PIPESTATUS[0]}
