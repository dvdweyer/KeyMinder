name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)

      - name: Build
        run: |
          xcodebuild \
            -project KeyMinder.xcodeproj \
            -scheme KeyMinder \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/KeyMinder-CI \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/build.log | xcpretty --color
          exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild \
            -project KeyMinder.xcodeproj \
            -scheme KeyMinder \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/KeyMinder-CI \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee /tmp/test.log | xcpretty --color
          exit ${PIPESTATUS[0]}

      - name: Upload raw logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: /tmp/*.log
